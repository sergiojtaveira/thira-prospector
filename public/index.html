<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thira Prospector</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #7ecfad; --teal-light: #9edfc0; --teal-dim: rgba(126,207,173,0.12);
    --bg: #0d1f1a; --bg-mid: #122b24; --bg-card: #0f2520;
    --text: #e8f0ec; --text-muted: rgba(232,240,236,0.55); --text-faint: rgba(232,240,236,0.28);
    --border: rgba(255,255,255,0.07); --border-teal: rgba(126,207,173,0.22);
    --red: #f87171; --amber: #fbbf24; --blue: #60a5fa; --gold: #fcd34d;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; border-bottom: 0.5px solid var(--border); background: rgba(13,31,26,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50; }
  .logo { font-size: 18px; font-weight: 500; color: var(--teal); letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--text-faint); letter-spacing: 1.5px; text-transform: uppercase; margin-left: 0.75rem; }
  .header-badge { font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--teal); border: 0.5px solid var(--border-teal); padding: 0.3rem 0.8rem; border-radius: 100px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  .main-tabs { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 0.5px solid var(--border); }
  .main-tab { font-size: 13px; font-weight: 500; padding: 0.75rem 1.5rem; cursor: pointer; background: transparent; color: var(--text-muted); border: none; font-family: 'DM Sans', sans-serif; border-bottom: 2px solid transparent; transition: all 0.2s; position: relative; bottom: -0.5px; }
  .main-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .main-tab:hover:not(.active) { color: var(--text); }
  .tab-count { font-size: 10px; background: var(--teal-dim); color: var(--teal); border-radius: 100px; padding: 0.1rem 0.5rem; margin-left: 0.4rem; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .search-panel { background: var(--bg-mid); border: 0.5px solid var(--border-teal); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
  .panel-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 0.4rem; letter-spacing: -0.3px; }
  .panel-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.75rem; font-weight: 300; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.75rem; align-items: end; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  label { font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(126,207,173,0.6); }
  input { background: var(--bg); border: 0.5px solid var(--border); border-radius: 8px; padding: 0.7rem 1rem; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; width: 100%; }
  input::placeholder { color: var(--text-faint); }
  input:focus { border-color: var(--border-teal); }
  .search-btn { background: var(--teal); color: var(--bg); border: none; border-radius: 8px; padding: 0.7rem 1.75rem; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.2s, transform 0.15s; white-space: nowrap; }
  .search-btn:hover { background: var(--teal-light); transform: translateY(-1px); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .api-section { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); }
  .api-note { font-size: 12px; color: var(--text-faint); margin-top: 0.5rem; line-height: 1.6; }
  .quick-picks { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
  .quick-label { font-size: 11px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; }
  .quick-pill { font-size: 12px; color: var(--text-muted); border: 0.5px solid var(--border); border-radius: 100px; padding: 0.25rem 0.75rem; cursor: pointer; transition: all 0.15s; background: transparent; font-family: 'DM Sans', sans-serif; }
  .quick-pill:hover { border-color: var(--border-teal); color: var(--teal); background: var(--teal-dim); }
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
  .stat-cell { background: var(--bg-card); padding: 1rem 1.25rem; text-align: center; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); line-height: 1; margin-bottom: 0.2rem; }
  .stat-num.green { color: var(--teal); }
  .stat-num.amber { color: var(--amber); }
  .stat-label { font-size: 11px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; }
  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem; }
  .results-title { font-size: 13px; font-weight: 500; color: var(--text-muted); }
  .action-btn { font-size: 12px; font-weight: 500; color: var(--teal); border: 0.5px solid var(--border-teal); border-radius: 100px; padding: 0.35rem 1rem; cursor: pointer; background: transparent; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .action-btn:hover { background: var(--teal-dim); }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .refresh-btn { font-size: 12px; font-weight: 600; color: var(--bg); background: var(--gold); border: none; border-radius: 100px; padding: 0.4rem 1rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .refresh-btn:hover { background: var(--amber); transform: translateY(-1px); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .filter-tab { font-size: 12px; font-weight: 500; padding: 0.4rem 1rem; border-radius: 100px; border: 0.5px solid var(--border); cursor: pointer; background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .filter-tab.active { background: var(--teal-dim); border-color: var(--border-teal); color: var(--teal); }
  .filter-tab:hover:not(.active) { border-color: var(--border-teal); color: var(--text); }
  .results-grid { display: flex; flex-direction: column; gap: 0.75rem; }
  .result-card { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.1rem 1.5rem; display: grid; grid-template-columns: 1fr auto; gap: 1rem; align-items: center; transition: border-color 0.2s, background 0.2s; animation: slideIn 0.3s ease both; }
  .result-card:hover { border-color: var(--border-teal); background: var(--bg-mid); }
  .result-card.no-website { border-left: 2px solid var(--teal); }
  .result-card.bad-website { border-left: 2px solid var(--amber); }
  .result-card.has-website { border-left: 2px solid rgba(255,255,255,0.08); opacity: 0.55; }
  .result-name a { color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500; }
  .result-name a:hover { color: var(--teal); }
  .result-meta { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-top: 0.2rem; }
  .result-meta-item { font-size: 12px; color: var(--text-faint); }
  .result-address { font-size: 12px; color: var(--text-muted); margin-top: 0.15rem; }
  .stars { color: var(--amber); font-size: 11px; }
  .result-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }
  .badge { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 0.25rem 0.65rem; border-radius: 100px; white-space: nowrap; }
  .badge.no-website { background: rgba(126,207,173,0.12); color: var(--teal); border: 0.5px solid rgba(126,207,173,0.3); }
  .badge.bad-website { background: rgba(251,191,36,0.1); color: var(--amber); border: 0.5px solid rgba(251,191,36,0.25); }
  .badge.has-website { background: rgba(255,255,255,0.04); color: var(--text-faint); border: 0.5px solid var(--border); }
  .result-website { font-size: 11px; color: var(--text-faint); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
  .result-website a { color: var(--text-muted); text-decoration: none; }
  .result-website a:hover { color: var(--teal); }
  .result-phone { font-size: 12px; color: var(--teal); opacity: 0.7; }
  .add-btn { font-size: 11px; font-weight: 600; color: var(--bg); background: var(--teal); border: none; border-radius: 100px; padding: 0.3rem 0.85rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .add-btn:hover { background: var(--teal-light); }
  .add-btn.added { background: transparent; color: var(--teal); border: 0.5px solid var(--border-teal); cursor: default; }
  .state-box { text-align: center; padding: 4rem 2rem; border: 0.5px dashed var(--border); border-radius: 12px; color: var(--text-faint); }
  .state-icon { font-size: 36px; margin-bottom: 1rem; opacity: 0.5; }
  .state-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text-muted); margin-bottom: 0.5rem; }
  .state-desc { font-size: 13px; font-weight: 300; line-height: 1.6; max-width: 360px; margin: 0 auto; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border-teal); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  .error-box { background: rgba(248,113,113,0.08); border: 0.5px solid rgba(248,113,113,0.25); border-radius: 10px; padding: 1rem 1.25rem; font-size: 13px; color: var(--red); margin-bottom: 1.5rem; line-height: 1.5; }
  .progress-box { background: rgba(252,211,77,0.08); border: 0.5px solid rgba(252,211,77,0.3); border-radius: 10px; padding: 1rem 1.25rem; font-size: 13px; color: var(--gold); margin-bottom: 1.5rem; line-height: 1.5; display: flex; align-items: center; gap: 0.75rem; }
  .progress-spinner { width: 18px; height: 18px; border: 2px solid rgba(252,211,77,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  .crm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
  .crm-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text); letter-spacing: -0.3px; }
  .crm-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .crm-stats { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
  .crm-stat { background: var(--bg-card); padding: 0.85rem 1rem; text-align: center; }
  .crm-stat-num { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); line-height: 1; margin-bottom: 0.2rem; }
  .crm-stat-num.blue { color: var(--blue); }
  .crm-stat-num.gold { color: var(--gold); }
  .crm-stat-label { font-size: 10px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; }
  .crm-filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .crm-filter { font-size: 11px; font-weight: 500; padding: 0.35rem 0.9rem; border-radius: 100px; border: 0.5px solid var(--border); cursor: pointer; background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .crm-filter.active { background: var(--teal-dim); border-color: var(--border-teal); color: var(--teal); }
  .crm-filter.active.starred { background: rgba(252,211,77,0.12); border-color: rgba(252,211,77,0.4); color: var(--gold); }
  .crm-filter:hover:not(.active) { border-color: var(--border-teal); color: var(--text); }
  .crm-table-wrap { border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 1200px; }
  thead tr { background: var(--bg-mid); border-bottom: 0.5px solid var(--border); }
  th { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faint); padding: 0.85rem 1rem; text-align: left; white-space: nowrap; }
  tbody tr { border-bottom: 0.5px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg-mid); }
  tbody tr.starred-row { background: rgba(252,211,77,0.04); }
  tbody tr.starred-row:hover { background: rgba(252,211,77,0.08); }
  td { padding: 0.85rem 1rem; font-size: 13px; color: var(--text-muted); vertical-align: top; }
  td.name-cell { color: var(--text); font-weight: 500; }
  td.name-cell a { color: var(--text); text-decoration: none; }
  td.name-cell a:hover { color: var(--teal); }
  .star-btn { background: none; border: none; cursor: pointer; padding: 0.3rem; font-size: 18px; line-height: 1; transition: transform 0.15s; color: var(--text-faint); }
  .star-btn:hover { transform: scale(1.15); color: var(--gold); }
  .star-btn.starred { color: var(--gold); }
  .star-btn.starred:hover { color: var(--amber); }
  .status-cell { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .status-toggle { font-size: 10px; font-weight: 600; padding: 0.25rem 0.6rem; border-radius: 100px; cursor: pointer; border: 0.5px solid var(--border); background: transparent; color: var(--text-faint); font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .status-toggle:hover { border-color: var(--border-teal); color: var(--text); }
  .status-toggle.on { background: var(--teal-dim); border-color: rgba(126,207,173,0.4); color: var(--teal); }
  .status-toggle.on.called { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); color: var(--amber); }
  .status-toggle.on.callback { background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.3); color: var(--blue); }
  .status-toggle.on.not-interested { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.25); color: var(--red); }
  .status-toggle.on.closed { background: rgba(126,207,173,0.2); border-color: rgba(126,207,173,0.5); color: var(--teal); }
  .call-history { font-size: 10px; color: var(--text-faint); margin-top: 4px; line-height: 1.3; }
  .call-history .recent { color: var(--amber); font-weight: 500; }
  .call-history .stale { color: var(--text-muted); }
  .notes-cell { min-width: 200px; max-width: 280px; }
  .notes-preview { font-size: 12px; color: var(--text-muted); font-family: 'DM Sans', sans-serif; padding: 0.5rem 0.7rem; border: 0.5px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.15s; min-height: 32px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .notes-preview:hover { border-color: var(--border-teal); background: var(--bg-mid); color: var(--text); }
  .notes-preview.empty { color: var(--text-faint); font-style: italic; }
  .notes-textarea { font-size: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; background: var(--bg); border: 0.5px solid var(--border-teal); border-radius: 6px; padding: 0.6rem 0.7rem; width: 100%; min-height: 90px; resize: vertical; outline: none; line-height: 1.5; transition: border-color 0.15s; }
  .notes-textarea:focus { border-color: var(--teal); }
  .email-input { background: transparent; border: 0.5px solid var(--border); border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 11px; color: var(--text-muted); font-family: 'DM Sans', sans-serif; outline: none; transition: all 0.15s; width: 100%; min-width: 150px; }
  .email-input::placeholder { color: var(--text-faint); font-style: italic; }
  .email-input:hover { border-color: var(--border-teal); }
  .email-input:focus { border-color: var(--teal); color: var(--text); background: var(--bg); }
  .rating-cell { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .rating-cell .stars { display: block; margin-bottom: 2px; }
  .rating-cell .review-count { font-size: 11px; color: var(--text-faint); }
  .hours-preview { font-size: 11px; color: var(--text-muted); padding: 0.35rem 0.55rem; border: 0.5px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.15s; min-width: 110px; max-width: 180px; line-height: 1.3; }
  .hours-preview:hover { border-color: var(--border-teal); background: var(--bg-mid); color: var(--text); }
  .hours-preview.empty { color: var(--text-faint); font-style: italic; }
  .hours-popup { position: absolute; background: var(--bg-mid); border: 0.5px solid var(--border-teal); border-radius: 8px; padding: 0.75rem 1rem; font-size: 11px; color: var(--text); z-index: 100; min-width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); line-height: 1.6; }
  .hours-popup div { white-space: nowrap; }
  .hours-popup .day { color: var(--teal); font-weight: 500; margin-right: 8px; display: inline-block; min-width: 36px; }
  .delete-btn { font-size: 18px; color: var(--text-faint); background: none; border: none; cursor: pointer; padding: 0.2rem 0.4rem; transition: color 0.15s; line-height: 1; }
  .delete-btn:hover { color: var(--red); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 700px) { .form-row { grid-template-columns: 1fr; } .stats-bar { grid-template-columns: repeat(2,1fr); } .result-card { grid-template-columns: 1fr; } .result-right { align-items: flex-start; flex-direction: row; flex-wrap: wrap; } .crm-stats { grid-template-columns: repeat(3,1fr); } }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:0.5rem">
    <span class="logo">thira</span>
    <span class="logo-sub">Prospector</span>
  </div>
  <div class="header-badge">Lead Finder</div>
</header>

<div class="container">
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchTab('search')">&#128269; Search</button>
    <button class="main-tab" onclick="switchTab('crm')" id="crmTab">&#128101; My List <span class="tab-count" id="crmCount">0</span></button>
  </div>

  <div class="tab-panel active" id="searchPanel">
    <div class="search-panel">
      <div class="panel-title">Find businesses without websites</div>
      <div class="panel-sub">Search any trade or service in any
